# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod CONTROL SHIFT, Q, forcekillactive,
bind = $mainMod CONTROL SHIFT ALT, Q, exit,
# bind = $mainMod, Q, exec, $terminal
# bind = $mainMod, C, killactive,
# bind = $mainMod, M, exit,
bind = $mainMod CONTROL, space, togglefloating,
# bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, W, fullscreen, 1
bind = $mainMod, F, fullscreen

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = alt, tab, cyclenext
bind = alt shift, tab, cyclenext, prev
# bind = $mainMod alt, tab, swapnext
# bind = $mainMod alt shift, tab, swapnext, prev

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5
bind = $mainMod, 6, split-workspace, 6
bind = $mainMod, 7, split-workspace, 7
bind = $mainMod, 8, split-workspace, 8
bind = $mainMod, 9, split-workspace, 9
bind = $mainMod, 0, split-workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, split-movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, split-movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, split-movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, split-movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, split-movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, split-movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, split-movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, split-movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, split-movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, split-movetoworkspacesilent, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, tab, split-workspace, +1
bind = $mainMod SHIFT, tab, split-workspace, -1
bind = $mainMod alt, tab, split-cycleworkspacesnowrap, +1
bind = $mainMod CTRL, tab, focusmonitor, +1
bind = $mainMod CTRL SHIFT, tab, focusmonitor, -1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# bind = $mainMod, R, exec, $menu
bind = $mainMod, R, exec, vicinae open
bind = $mainMod ALT, V, exec, swap-audio-output-device

bind = $mainMod, E, exec, $fileManager
bind = $mainMod CONTROL, E, exec, $fileManager ~/MEMES
bind = $mainMod ALT, C, exec, $terminal
bind = $mainMod CTRL ALT, C, exec, kitty
bind = $mainMod ALT, D, exec, meme-download
bind = $mainMod ALT, M, exec, ~/.scripts/mpv-play
bind = , Print, exec, ~/.scripts/screenshot-region
bind = $mainMod SHIFT, S, exec, ~/.scripts/screenshot-region
bind = SHIFT, Print, exec, ~/.scripts/screenshot-window -c
bind = SHIFT ALT, Print, exec, ~/.scripts/screenshot-window
bind = $mainMod CTRL SHIFT, S, exec, ~/.scripts/screenshot-window

