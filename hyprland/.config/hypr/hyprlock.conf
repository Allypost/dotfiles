background {
    monitor =
    color = rgba(0, 0, 0, 0.9)
    # blur_passes = 2
    # path = screenshot
}

input-field {
    monitor =
    size = 80,80
    outline_thickness = 5
    inner_color = rgb(0, 0, 0) # no fill

    outer_color = rgba(8e24aaee)
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_family = IosevkAlly Nerd Font
    font_color = rgb(ffffff)
    fade_on_empty = false
    rounding = -1
    placeholder_text = 
    fail_text = "$FAIL <b>($ATTEMPTS)</b>"
    hide_input = true

    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo -ne "<span>$(date +"%d. %m. %Y\n  %H:%M:%S")</span>"
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = IosevkAlly Nerd Font

    position = 0, -160
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi there, $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = IosevkAlly Nerd Font

    position = 0, 60
    halign = center
    valign = center
}
